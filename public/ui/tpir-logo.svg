<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" role="img" aria-label="The Price Is Right">
  <!-- Spiral dollar sign: black outline pass, then yellow pass -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="#111" stroke-width="46">
      <path d="M210 34 L210 586"/>
      <path d="M210 62 A 78 78 0 0 1 210 218 A 54 54 0 0 1 210 110 A 33 33 0 0 1 210 176 A 16 16 0 0 1 210 144"/>
      <path d="M210 558 A 78 78 0 0 1 210 402 A 54 54 0 0 1 210 510 A 33 33 0 0 1 210 444 A 16 16 0 0 1 210 476"/>
    </g>
    <g stroke="#ffe500" stroke-width="26">
      <path d="M210 34 L210 586"/>
      <path d="M210 62 A 78 78 0 0 1 210 218 A 54 54 0 0 1 210 110 A 33 33 0 0 1 210 176 A 16 16 0 0 1 210 144"/>
      <path d="M210 558 A 78 78 0 0 1 210 402 A 54 54 0 0 1 210 510 A 33 33 0 0 1 210 444 A 16 16 0 0 1 210 476"/>
    </g>
  </g>
  <!-- Stacked blocky wordmark -->
  <g font-family="'Arial Black', Impact, sans-serif" font-weight="900" paint-order="stroke" stroke="#111" stroke-linejoin="round" text-anchor="start">
    <text x="345" y="168" font-size="132" fill="#e8401c" stroke-width="12">the</text>
    <text x="345" y="318" font-size="148" fill="#ffe500" stroke-width="13">PRICE</text>
    <text x="345" y="452" font-size="126" fill="#f6871f" stroke-width="12">is</text>
    <text x="345" y="596" font-size="148" fill="#e8401c" stroke-width="13">Right</text>
  </g>
</svg>
